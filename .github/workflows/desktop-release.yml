name: Desktop Release

on:
  workflow_call:
    inputs:
      source_ref:
        description: Commit SHA, branch, or tag to package
        required: true
        type: string
      release_version:
        description: Desktop artifact version to inject into electron-builder
        required: true
        type: string
      artifact_name:
        description: Name for the uploaded Actions artifact
        required: true
        type: string
      upload_to_release:
        description: Upload built installers to an existing GitHub Release
        required: true
        type: boolean
      github_release_tag:
        description: Existing GitHub Release tag to upload assets into
        required: false
        type: string
  workflow_dispatch:
    inputs:
      source_ref:
        description: Commit SHA, branch, or tag to package
        required: true
        type: string
        default: master
      release_version:
        description: Desktop artifact version to inject into electron-builder
        required: true
        type: string
      artifact_name:
        description: Name for the uploaded Actions artifact
        required: true
        type: string
        default: desktop-release-manual
      upload_to_release:
        description: Upload built installers to an existing GitHub Release
        required: true
        type: boolean
        default: false
      github_release_tag:
        description: Existing GitHub Release tag to upload assets into
        required: false
        type: string

jobs:
  build_desktop_assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: win
            arch: x64
          - runner: macos-13
            platform: mac
            arch: x64
          - runner: macos-latest
            platform: mac
            arch: arm64
          - runner: ubuntu-latest
            platform: linux
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        shell: bash
        run: pnpm install --no-frozen-lockfile

      - name: Restore tracked install-time changes
        shell: bash
        run: git checkout -- pnpm-lock.yaml

      - name: Typecheck desktop package
        shell: bash
        run: pnpm --filter @penclipai/desktop-electron typecheck

      - name: Build desktop package
        shell: bash
        env:
          PAPERCLIP_DESKTOP_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          pnpm --filter @penclipai/desktop-electron dist -- --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}"

      - name: Smoke packaged Windows desktop app
        if: matrix.platform == 'win'
        shell: bash
        run: pnpm smoke:desktop --mode packaged

      - name: Read desktop artifact manifest
        id: manifest
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const manifestPath = "packages/desktop-electron/release/desktop-artifacts.json";
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          const releaseAssetPaths = Array.isArray(manifest.releaseAssetPaths) ? manifest.releaseAssetPaths : [];
          if (releaseAssetPaths.length === 0) {
            throw new Error(`No desktop release assets were listed in ${manifestPath}.`);
          }
          console.log("artifact_paths<<EOF");
          console.log([manifestPath, ...releaseAssetPaths].join("\n"));
          console.log("EOF");
          console.log("release_asset_paths<<EOF");
          console.log(releaseAssetPaths.join("\n"));
          console.log("EOF");
          NODE

      - name: Upload desktop artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error
          path: ${{ steps.manifest.outputs.artifact_paths }}

      - name: Upload desktop assets to GitHub Release
        if: inputs.upload_to_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${{ inputs.github_release_tag }}" ]; then
            echo "github_release_tag is required when upload_to_release=true." >&2
            exit 1
          fi

          mapfile -t assets < <(printf '%s\n' "${{ steps.manifest.outputs.release_asset_paths }}")
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No desktop release assets were listed in the manifest output." >&2
            exit 1
          fi

          gh release upload "${{ inputs.github_release_tag }}" "${assets[@]}" --repo "${{ github.repository }}" --clobber
