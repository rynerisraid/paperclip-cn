name: PR

on:
  pull_request:
    branches:
      - master

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Enforce lockfile policy
        run: |
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          manifest_pattern='(^|/)package\.json$|^pnpm-workspace\.yaml$|^\.npmrc$|^pnpmfile\.(cjs|js|mjs)$'
          lockfile_changed=false
          manifest_changed=false

          if printf '%s\n' "$changed" | grep -qx 'pnpm-lock.yaml'; then
            lockfile_changed=true
          fi

          if printf '%s\n' "$changed" | grep -Eq "$manifest_pattern"; then
            manifest_changed=true
          fi

          if [ "$lockfile_changed" = true ] && [ "$manifest_changed" = false ] && [ "${{ github.head_ref }}" != 'chore/refresh-lockfile' ]; then
            echo "pnpm-lock.yaml changed without any package-manager input changes."
            echo "Restore the lockfile unless this is an intentional refresh-lockfile PR."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Validate Dockerfile deps stage
        run: |
          missing=0

          # Extract only the deps stage from the Dockerfile
          deps_stage="$(awk '/^FROM .* AS deps$/{found=1; next} found && /^FROM /{exit} found{print}' Dockerfile)"

          if [ -z "$deps_stage" ]; then
            echo "::error::Could not extract deps stage from Dockerfile (expected 'FROM ... AS deps')"
            exit 1
          fi

          # Derive workspace search roots from pnpm-workspace.yaml (exclude dev-only packages)
          search_roots="$(grep '^ *- ' pnpm-workspace.yaml | sed 's/^ *- //' | sed 's/\*$//' | grep -v 'examples' | grep -v 'create-paperclip-plugin' | tr '\n' ' ')"

          if [ -z "$search_roots" ]; then
            echo "::error::Could not derive workspace roots from pnpm-workspace.yaml"
            exit 1
          fi

          # Check all workspace package.json files are copied in the deps stage
          for pkg in $(find $search_roots -maxdepth 2 -name package.json -not -path '*/examples/*' -not -path '*/create-paperclip-plugin/*' -not -path '*/node_modules/*' 2>/dev/null | sort -u); do
            dir="$(dirname "$pkg")"
            if ! echo "$deps_stage" | grep -q "^COPY ${dir}/package.json"; then
              echo "::error::Dockerfile deps stage missing: COPY ${pkg} ${dir}/"
              missing=1
            fi
          done

          # Check patches directory is copied if it exists
          if [ -d patches ] && ! echo "$deps_stage" | grep -q '^COPY patches/'; then
            echo "::error::Dockerfile deps stage missing: COPY patches/ patches/"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "Dockerfile deps stage is out of sync. Update it to include the missing files."
            exit 1
          fi

      - name: Validate dependency resolution when manifests change
        run: |
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          manifest_pattern='(^|/)package\.json$|^pnpm-workspace\.yaml$|^\.npmrc$|^pnpmfile\.(cjs|js|mjs)$'
          if printf '%s\n' "$changed" | grep -Eq "$manifest_pattern"; then
            cp pnpm-lock.yaml pnpm-lock.yaml.before-policy
            trap 'rm -f pnpm-lock.yaml.before-policy' EXIT
            pnpm install --lockfile-only --ignore-scripts --no-frozen-lockfile
            if ! git diff --no-index --quiet pnpm-lock.yaml.before-policy pnpm-lock.yaml; then
              echo "pnpm-lock.yaml is not synchronized with the manifest changes in this PR."
              echo "Commit the resulting minimal lockfile update."
              diff -u pnpm-lock.yaml.before-policy pnpm-lock.yaml || true
              exit 1
            fi
          fi

  verify:
    needs: [policy]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm test:run

      - name: Build
        run: pnpm build

      - name: Release canary dry run
        run: |
          git checkout -B master HEAD
          git checkout -- pnpm-lock.yaml
          ./scripts/release.sh canary --skip-verify --dry-run

  e2e:
    needs: [policy]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        env:
          PAPERCLIP_E2E_SKIP_LLM: "true"
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 14

  windows_compat:
    needs: [policy]
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run targeted Windows compatibility tests
        run: pnpm test:windows-compat

      - name: Build desktop package sources
        run: pnpm --filter @penclipai/desktop-electron build
